name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build, test, dogfood, bench
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit + docs-lint (parity / switcher / link / secret checks).
      - name: Lint (typecheck + docs)
        run: npm run lint

      - name: Build
        run: npm run build

      # Fast unit suite (excludes the slow dogfood guard, run separately below).
      - name: Unit tests
        run: npm test

      # Dogfood guard: index Parallax on itself and assert the internal
      # DEPENDS_ON graph survives — catches regressions green unit tests miss.
      - name: Dogfood guard
        run: npm run test:dogfood

      # Deterministic fixture bench; exits non-zero on recall/score regression.
      - name: Impact bench
        run: npm run bench

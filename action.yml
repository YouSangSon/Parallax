name: Parallax Impact SARIF
description: Generate a Parallax impact SARIF file for GitHub Code Scanning upload.
inputs:
  changed:
    description: Comma-separated changed file list passed to parallax analyze.
    required: true
  sarif-output:
    description: Path to write the SARIF file.
    required: false
    default: parallax.sarif
  sarif-category:
    description: GitHub Code Scanning category/run automation id.
    required: false
    default: parallax
  fail-on:
    description: Confidence threshold for non-zero exit.
    required: false
    default: none
runs:
  using: composite
  steps:
    - shell: bash
      env:
        PARALLAX_CHANGED: ${{ inputs.changed }}
        PARALLAX_SARIF_OUTPUT: ${{ inputs.sarif-output }}
        PARALLAX_SARIF_CATEGORY: ${{ inputs.sarif-category }}
        PARALLAX_FAIL_ON: ${{ inputs.fail-on }}
      run: npx parallax analyze --changed "$PARALLAX_CHANGED" --sarif-output "$PARALLAX_SARIF_OUTPUT" --sarif-category "$PARALLAX_SARIF_CATEGORY" --fail-on "$PARALLAX_FAIL_ON"
